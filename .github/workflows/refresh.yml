name: Refresh data

# On-demand only. Regenerates static/data/*.json from the committed Overpass
# caches and commits them; the resulting push to master triggers the deploy
# workflow (pages.yml).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Refresh data
        run: bun run data:refresh

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/calendar.json static/data/street-geometries.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Refresh Sperrmüll data"
            git push
          fi
